<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.3" flood-color="#000000" />
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="700" fill="#0D1117" />
  
  <!-- Profile Container -->
  <rect x="40" y="20" width="720" height="660" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" filter="url(#shadow)" />

  <g transform="translate(90, 60)">
    <!-- Header -->
    <text x="0" y="0" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#58A6FF" letter-spacing="1.5">✦ ABOUT ME</text>
    <text x="620" y="0" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#58A6FF" letter-spacing="1.5" text-anchor="end">01 / PROFILE</text>
    
    <line x1="0" y1="15" x2="620" y2="15" stroke="#30363D" stroke-width="1" />
    
    <!-- Title Section -->
    <text x="0" y="65" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#E6EDF3" letter-spacing="-0.5">Divyanshu Kumar</text>
    <text x="0" y="95" font-family="'Times New Roman', Times, serif" font-style="italic" font-size="18" fill="#8B949E">Electronics &amp; Communication Engineering · Batch of 2023-2027</text>
    <text x="0" y="120" font-family="'Times New Roman', Times, serif" font-style="italic" font-size="18" fill="#8B949E">Faculty Of Technology, University Of Delhi</text>
    
    <!-- Specialization -->
    <text x="0" y="170" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#E6EDF3" letter-spacing="2">SPECIALIZATION</text>
    
    <g transform="translate(0, 190)">
      <rect x="0" y="0" width="105" height="28" rx="2" fill="#58A6FF" fill-opacity="0.08" stroke="#58A6FF" stroke-width="1"/>
      <text x="52.5" y="18" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#58A6FF" text-anchor="middle">Data Science</text>
      
      <rect x="115" y="0" width="160" height="28" rx="2" fill="#58A6FF" fill-opacity="0.08" stroke="#58A6FF" stroke-width="1"/>
      <text x="195" y="18" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#58A6FF" text-anchor="middle">IoT / EMBEDDED</text>

      <rect x="285" y="0" width="55" height="28" rx="2" fill="#58A6FF" fill-opacity="0.08" stroke="#58A6FF" stroke-width="1"/>
      <text x="312.5" y="18" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#58A6FF" text-anchor="middle">SDE</text>

      <rect x="350" y="0" width="150" height="28" rx="2" fill="#58A6FF" fill-opacity="0.08" stroke="#58A6FF" stroke-width="1"/>
      <text x="425" y="18" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#58A6FF" text-anchor="middle">SEMICONDUCTOR</text>
    </g>
    
    <!-- Bio Paragraph -->
    <text x="0" y="260" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="400" fill="#C9D1D9">I build across the hardware-to-software spectrum — from embedded prototypes</text>
    <text x="0" y="285" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="400" fill="#C9D1D9">and sensor-driven automation to backend systems, web applications, security</text>
    <text x="0" y="310" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="400" fill="#C9D1D9">tooling, and blockchain-oriented engineering projects.</text>
    
    <!-- Engineering Focus -->
    <text x="0" y="365" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#E6EDF3" letter-spacing="2">ENGINEERING FOCUS</text>
    
    
        <rect x="0" y="385" width="300" height="70" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1" />
        <text x="20" y="413" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#58A6FF">01</text>
        <text x="50" y="413" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#E6EDF3">Data Science</text>
        <text x="50" y="435" font-family="'Times New Roman', Times, serif" font-size="15" fill="#8B949E">Data Analysis &amp; ML Tools</text>
        
    
        <rect x="320" y="385" width="300" height="70" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1" />
        <text x="340" y="413" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#58A6FF">02</text>
        <text x="370" y="413" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#E6EDF3">IoT / Embedded</text>
        <text x="370" y="435" font-family="'Times New Roman', Times, serif" font-size="15" fill="#8B949E">Sensor Systems &amp; Automation</text>
        
    
        <rect x="0" y="470" width="300" height="70" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1" />
        <text x="20" y="498" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#58A6FF">03</text>
        <text x="50" y="498" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#E6EDF3">SDE</text>
        <text x="50" y="520" font-family="'Times New Roman', Times, serif" font-size="15" fill="#8B949E">Data Structures &amp; Problem Solving</text>
        
    
        <rect x="320" y="470" width="300" height="70" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1" />
        <text x="340" y="498" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#58A6FF">04</text>
        <text x="370" y="498" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#E6EDF3">Semiconductor</text>
        <text x="370" y="520" font-family="'Times New Roman', Times, serif" font-size="15" fill="#8B949E">Analog &amp; Circuit Design</text>
        
    
    <!-- Quote -->
    <line x1="0" y1="565" x2="0" y2="605" stroke="#58A6FF" stroke-width="4" />
    <text x="20" y="582" font-family="'Times New Roman', Times, serif" font-style="italic" font-size="20" fill="#E6EDF3">"I do not just write code.</text>
    <text x="20" y="605" font-family="Georgia, serif" font-weight="bold" font-size="20" fill="#E6EDF3">I design systems that solve real problems."</text>
  </g>
</svg>
