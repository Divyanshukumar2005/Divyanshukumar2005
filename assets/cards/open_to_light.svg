<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.04" flood-color="#000000" />
    </filter>
  </defs>
  <rect x="0" y="0" width="880" height="260" fill="#F7F7F8" />
  <rect x="40" y="20" width="800" height="220" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <g transform="translate(40, 20)">
    <text x="32" y="32" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#059669" letter-spacing="2">✦ OPPORTUNITIES</text>
    <circle cx="580" cy="28" r="4" fill="#059669">
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="594" y="32" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="600" fill="#059669" letter-spacing="1">OPEN TO OPPORTUNITIES</text>

    <text x="32" y="90" font-family="'Times New Roman', Times, serif" font-size="16" fill="#4A5568">I am particularly interested in opportunities where I can contribute to:</text>

