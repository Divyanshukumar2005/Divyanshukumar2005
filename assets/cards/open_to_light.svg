    <text x="126" y="136" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="500" fill="#1A202C" text-anchor="middle">Software Engineering</text>

    <rect x="232" y="115" width="126" height="32" rx="16" fill="#E2E8F0" fill-opacity="0.2" stroke="#E2E8F0" stroke-width="1"/>
    <text x="295" y="136" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="500" fill="#1A202C" text-anchor="middle">Data Science</text>

    <rect x="370" y="115" width="149" height="32" rx="16" fill="#E2E8F0" fill-opacity="0.2" stroke="#E2E8F0" stroke-width="1"/>
    <text x="444" y="136" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="500" fill="#1A202C" text-anchor="middle">IoT Engineering</text>

    <rect x="32" y="163" width="157" height="32" rx="16" fill="#E2E8F0" fill-opacity="0.2" stroke="#E2E8F0" stroke-width="1"/>
    <text x="110" y="184" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="500" fill="#1A202C" text-anchor="middle">Embedded Systems</text>

    <rect x="201" y="163" width="157" height="32" rx="16" fill="#E2E8F0" fill-opacity="0.2" stroke="#E2E8F0" stroke-width="1"/>
    <text x="279" y="184" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="500" fill="#1A202C" text-anchor="middle">Machine Learning</text>

    <rect x="370" y="163" width="188" height="32" rx="16" fill="#E2E8F0" fill-opacity="0.2" stroke="#E2E8F0" stroke-width="1"/>
    <text x="464" y="184" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="500" fill="#1A202C" text-anchor="middle">Semiconductor Design</text>
