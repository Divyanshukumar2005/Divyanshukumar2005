<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 390" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.35" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="880" height="390" fill="#0F172A"/>

  <!-- Main Container -->
  <rect x="40" y="20" width="800" height="350" rx="8"
