      Python • Pandas • NumPy • Matplotlib • Exploratory Data Analysis
    </text>

    <!-- Card 2 -->
    <rect x="412" y="70" width="350" height="50" rx="8"
          fill="#1E293B"
          stroke="#334155"/>
    <text x="428" y="90"
          font-family="'Courier New', Courier, monospace"
          font-size="12"
          font-weight="700"
          fill="#38BDF8">02</text>
    <text x="454" y="90"
          font-family="'Courier New', Courier, monospace"
          font-size="13"
          font-weight="700"
          fill="#F8FAFC"
          letter-spacing="1">IOT</text>
    <text x="428" y="110"
          font-family="'Times New Roman', Times, serif"
          font-size="11"
