  <g transform="translate(40,20)">
    <!-- Heading -->
    <text x="32" y="32"
          font-family="'Courier New', Courier, monospace"
          font-size="13"
          font-weight="600"
          fill="#38BDF8"
          letter-spacing="2">
      ✦ TECHNICAL DOMAINS
    </text>

    <!-- Card 1 -->
    <rect x="32" y="70" width="350" height="50" rx="8"
          fill="#1E293B"
          stroke="#334155"/>
    <text x="48" y="90"
          font-family="'Courier New', Courier, monospace"
          font-size="12"
          font-weight="700"
          fill="#38BDF8">01</text>
    <text x="74" y="90"
          font-family="'Courier New', Courier, monospace"
          font-size="13"
          font-weight="700"
          fill="#F8FAFC"
