    </text>

    <!-- Card 3 -->
    <rect x="32" y="135" width="350" height="50" rx="8"
          fill="#1E293B"
          stroke="#334155"/>
    <text x="48" y="155"
          font-family="'Courier New', Courier, monospace"
          font-size="12"
          font-weight="700"
          fill="#38BDF8">03</text>
    <text x="74" y="155"
          font-family="'Courier New', Courier, monospace"
          font-size="13"
          font-weight="700"
